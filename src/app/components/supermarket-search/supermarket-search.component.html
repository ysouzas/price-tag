<div class="supermarket-search animate-fade-in">
  <div class="search-box">
    <mat-form-field appearance="outline" class="full-width">
      <mat-icon matPrefix>store</mat-icon>
      <mat-label>{{ 'SEARCH.SUPERMARKETS' | translate }}</mat-label>
      <input matInput [formControl]="searchControl" placeholder="Search supermarkets..." />
    </mat-form-field>
  </div>

  @if (isLoading) {
    <div class="skeleton-list">
      @for (i of [1,2,3]; track i) {
        <div class="skeleton card-skeleton"></div>
      }
    </div>
  } @else {
    <div class="market-grid">
      @for (market of filteredSupermarkets; track market.id) {
        <div class="market-card premium-card">
          <div class="market-icon">
            <mat-icon>storefront</mat-icon>
          </div>
          <span class="market-name">{{ market.name }}</span>
        </div>
      } @empty {
        <div class="no-results">
          <mat-icon>location_off</mat-icon>
          <p>{{ 'SEARCH.NO_RESULTS' | translate }}</p>
        </div>
      }
    </div>
  }
</div>
