name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
      - develop # Added to trigger staging deployments
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    
    # 1. Dynamically scope to a GitHub Environment based on the branch
    environment: 
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

    steps:
      - uses: actions/checkout@v4 # Updated to v4 for Node 20 support
        with:
          submodules: true
          lfs: false

      # 2. Dynamically create the Angular environment file securely using GitHub Secrets
      - name: ⚙️ Set up Angular Environment Variables
        run: |
          cat <<EOF > src/environments/environment.prod.ts
          export const environment = {
            production: true,
            supabaseUrl: '${{ secrets.SUPABASE_URL }}',
            supabaseKey: '${{ secrets.SUPABASE_KEY }}'
          };
          EOF

      - name: 🚀 Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/" # App source code path
          api_location: "" # Api source code path - optional
          output_location: "dist/price-tag/browser" # Built app content directory
          
          # 3. Force Oryx (Azure's builder) to use your specific Angular configuration
          app_build_command: "npm run build -- --configuration=${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}"

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"